name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  syntax-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Check Python syntax
        run: python -m py_compile campus_auto_login.py

      - name: Check watch_build syntax
        run: python -m py_compile watch_build.py
