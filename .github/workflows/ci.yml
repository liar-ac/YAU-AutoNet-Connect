name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check Python syntax
        run: python -m py_compile campus_auto_login.py

      - name: Check watch_build syntax
        run: python -m py_compile watch_build.py

      - name: Check release verifier syntax
        run: python -m py_compile verify_release.py

      - name: Run tests
        run: python -m pytest test_campus_auto_login.py test_integration.py -q
